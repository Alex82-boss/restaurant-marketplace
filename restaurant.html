<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← Back</a>
  <span class="logo" id="restaurantName">Restaurant</span>
</header>

<div class="container restaurant-layout">

  <div class="menu-section">
    <h2 class="section-title">Menu</h2>
    <div class="grid" id="menu">
      <p class="loading">Loading menu...</p>
    </div>
  </div>

  <div class="cart-section">
    <h2 class="section-title">Your Cart</h2>
    <div id="cart"></div>
    <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">Proceed to Checkout</button>
  </div>

</div>

<!-- Both scripts are now type="module" — no more mixed script types -->
<script type="module" src="restaurant.js"></script>
<script type="module" src="cart.js"></script>

</body>
</html>
