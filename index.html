<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FoodHub X</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<header class="navbar">
  <div class="logo">FoodHub X</div>

  <div class="nav-center">
    <input type="text" id="searchInput" placeholder="What would you like delivered?" />
  </div>

  <div class="nav-right">
    <button class="ghost-btn">Orders</button>
    <button class="primary-btn">Profile</button>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Fast. Intelligent.<br>Frictionless.</h1>
    <p>
      Precision food commerce built for modern urban delivery.
    </p>

    <div class="chips">
      <button>Fast Delivery</button>
      <button>Top Rated</button>
      <button>Trending</button>
      <button>Premium Meals</button>
    </div>
  </div>
</section>

<section class="section">
  <div class="section-header">
    <h2>Priority Access</h2>
    <span>Partner promoted restaurants</span>
  </div>
  <div id="priorityGrid" class="grid"></div>
</section>

<section class="section">
  <div class="section-header">
    <h2>Live Demand</h2>
    <span>Most ordered right now</span>
  </div>
  <div id="liveGrid" class="grid"></div>
</section>

<section class="section">
  <div class="section-header">
    <h2>Precision Picks</h2>
    <span>Recommended meals</span>
  </div>
  <div id="mealGrid" class="grid"></div>
</section>

<footer class="mobile-nav">
  <button>Home</button>
  <button>Search</button>
  <button>Orders</button>
  <button>Profile</button>
</footer>

<script src="app.js"></script>
</body>
  </html>
